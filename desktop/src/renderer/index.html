<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>MEBBIS Account Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>MEBBIS Account Manager</h1>
      <button id="btn-add" class="btn btn-primary">+ Hesap Ekle</button>
    </header>

    <div id="account-list" class="account-list">
      <!-- Accounts rendered here -->
    </div>

    <div id="empty-state" class="empty-state" style="display:none;">
      <p>Henüz hesap eklenmedi.</p>
      <p>Yukarıdaki "Hesap Ekle" butonuna tıklayarak başlayın.</p>
    </div>
  </div>

  <!-- Add/Edit Account Modal -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h2 id="modal-title">Hesap Ekle</h2>
      <form id="account-form">
        <input type="hidden" id="form-id">
        <div class="form-group">
          <label for="form-label">Etiket (İsim)</label>
          <input type="text" id="form-label" placeholder="Örn: Sürücü Kursu A" required>
        </div>
        <div class="form-group">
          <label for="form-username">Kullanıcı Adı</label>
          <input type="text" id="form-username" placeholder="MEBBIS kullanıcı adı" required>
        </div>
        <div class="form-group">
          <label for="form-password">Şifre</label>
          <div class="password-container">
            <input type="password" id="form-password" placeholder="MEBBIS şifre" required>
            <button type="button" id="toggle-password" class="toggle-password-btn" title="Şifreyi Göster/Gizle">
              <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" id="btn-cancel" class="btn btn-secondary">İptal</button>
          <button type="submit" class="btn btn-primary">Kaydet</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
